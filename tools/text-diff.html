<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本对比 - 在线工具箱</title>
    <meta name="description" content="对比两段文本的差异">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="tool-page">
    <header class="tool-header">
        <div class="container">
            <a href="../index.html" class="back-link">← 返回</a>
            <h1 class="tool-title">文本对比</h1>
        </div>
    </header>

    <main class="tool-content">
        <div class="container">
            <div class="two-col">
                <div class="tool-section">
                    <h3>原始文本</h3>
                    <textarea id="text1" placeholder="输入第一段文本..."></textarea>
                </div>
                <div class="tool-section">
                    <h3>修改后文本</h3>
                    <textarea id="text2" placeholder="输入第二段文本..."></textarea>
                </div>
            </div>

            <div class="btn-group" style="justify-content:center">
                <button class="btn btn-primary" onclick="compare()">对比差异</button>
                <button class="btn btn-secondary" onclick="clearAll()">清空</button>
            </div>

            <div class="tool-section">
                <h3>对比结果</h3>
                <div id="result" class="result" style="min-height:200px;white-space:pre-wrap;font-family:monospace">点击"对比差异"按钮查看结果</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 在线工具箱</p>
        </div>
    </footer>

    <script>
        function compare() {
            const text1 = document.getElementById('text1').value;
            const text2 = document.getElementById('text2').value;

            if (!text1 && !text2) {
                alert('请输入文本');
                return;
            }

            const lines1 = text1.split('\n');
            const lines2 = text2.split('\n');
            const maxLines = Math.max(lines1.length, lines2.length);

            let result = '';
            let diffCount = 0;

            for (let i = 0; i < maxLines; i++) {
                const line1 = lines1[i] || '';
                const line2 = lines2[i] || '';

                if (line1 === line2) {
                    result += `  ${line1}\n`;
                } else {
                    diffCount++;
                    if (line1) result += `- <span style="background:#FEE2E2;color:#DC2626">${escapeHtml(line1)}</span>\n`;
                    if (line2) result += `+ <span style="background:#D1FAE5;color:#059669">${escapeHtml(line2)}</span>\n`;
                }
            }

            document.getElementById('result').innerHTML = result || '<span style="color:#059669">两段文本完全相同</span>';

            if (diffCount > 0) {
                document.getElementById('result').innerHTML += `\n<span style="color:#6B7280">共 ${diffCount} 处不同</span>`;
            }
        }

        function clearAll() {
            document.getElementById('text1').value = '';
            document.getElementById('text2').value = '';
            document.getElementById('result').innerHTML = '点击"对比差异"按钮查看结果';
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>
</html>
