<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间戳转换 - 在线工具箱</title>
    <meta name="description" content="Unix时间戳与日期时间互相转换">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="tool-page">
    <header class="tool-header">
        <div class="container">
            <a href="../index.html" class="back-link">← 返回</a>
            <h1 class="tool-title">时间戳转换</h1>
        </div>
    </header>

    <main class="tool-content">
        <div class="container">
            <div class="tool-section">
                <h3>当前时间</h3>
                <div style="text-align:center;padding:20px;background:#F3F4F6;border-radius:8px">
                    <div style="font-size:2.5rem;font-weight:bold;color:#4F46E5" id="currentTimestamp">-</div>
                    <div style="font-size:1.2rem;color:#6B7280;margin-top:8px" id="currentTime">-</div>
                </div>
            </div>

            <div class="two-col">
                <div class="tool-section">
                    <h3>时间戳 → 日期</h3>
                    <div style="margin-bottom:16px">
                        <label>时间戳：</label>
                        <input type="text" id="timestampInput" placeholder="输入Unix时间戳，如 1704067200">
                    </div>
                    <div style="margin-bottom:16px">
                        <label>单位：</label>
                        <select id="unit">
                            <option value="s">秒 (s)</option>
                            <option value="ms">毫秒 (ms)</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="tsToDate()">转换</button>
                    <div id="tsResult" class="result" style="margin-top:16px;display:none"></div>
                </div>

                <div class="tool-section">
                    <h3>日期 → 时间戳</h3>
                    <div style="margin-bottom:16px">
                        <label>日期时间：</label>
                        <input type="datetime-local" id="dateInput">
                    </div>
                    <button class="btn btn-primary" onclick="dateToTs()">转换</button>
                    <div id="dateResult" class="result" style="margin-top:16px;display:none"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 在线工具箱</p>
        </div>
    </footer>

    <script>
        // 更新当前时间
        function updateCurrentTime() {
            const now = new Date();
            document.getElementById('currentTimestamp').textContent = Math.floor(now.getTime() / 1000);
            document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN');
        }
        updateCurrentTime();
        setInterval(updateCurrentTime, 1000);

        // 设置默认日期
        document.getElementById('dateInput').value = new Date().toISOString().slice(0, 16);

        function tsToDate() {
            const ts = parseInt(document.getElementById('timestampInput').value);
            if (isNaN(ts)) {
                alert('请输入有效的时间戳');
                return;
            }

            const unit = document.getElementById('unit').value;
            const ms = unit === 's' ? ts * 1000 : ts;
            const date = new Date(ms);

            const result = document.getElementById('tsResult');
            result.style.display = 'block';
            result.textContent = `本地时间：${date.toLocaleString('zh-CN')}
UTC时间：${date.toUTCString()}
ISO格式：${date.toISOString()}
时间戳（秒）：${Math.floor(date.getTime() / 1000)}
时间戳（毫秒）：${date.getTime()}`;
        }

        function dateToTs() {
            const dateStr = document.getElementById('dateInput').value;
            if (!dateStr) {
                alert('请选择日期时间');
                return;
            }

            const date = new Date(dateStr);
            const result = document.getElementById('dateResult');
            result.style.display = 'block';
            result.textContent = `时间戳（秒）：${Math.floor(date.getTime() / 1000)}
时间戳（毫秒）：${date.getTime()}
本地时间：${date.toLocaleString('zh-CN')}
UTC时间：${date.toUTCString()}`;
        }
    </script>
</body>
</html>
