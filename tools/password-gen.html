<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 - 在线工具箱</title>
    <meta name="description" content="生成安全随机密码">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="tool-page">
    <header class="tool-header">
        <div class="container">
            <a href="../index.html" class="back-link">← 返回</a>
            <h1 class="tool-title">密码生成器</h1>
        </div>
    </header>

    <main class="tool-content">
        <div class="container">
            <div class="tool-section">
                <h3>生成密码</h3>
                <div style="display:flex;gap:10px;margin-bottom:20px">
                    <input type="text" id="password" readonly style="font-family:monospace;font-size:1.2rem;letter-spacing:2px">
                    <button class="btn btn-primary" onclick="copyPwd()">复制</button>
                    <button class="btn btn-secondary" onclick="generate()">刷新</button>
                </div>

                <div style="margin-bottom:16px">
                    <label>密码长度：<span id="lengthValue">16</span></label>
                    <input type="range" id="length" min="4" max="64" value="16" oninput="updateLength();generate()">
                </div>

                <div class="options-group">
                    <div class="option-item">
                        <input type="checkbox" id="upper" checked onchange="generate()">
                        <label for="upper">大写字母 (A-Z)</label>
                    </div>
                    <div class="option-item">
                        <input type="checkbox" id="lower" checked onchange="generate()">
                        <label for="lower">小写字母 (a-z)</label>
                    </div>
                    <div class="option-item">
                        <input type="checkbox" id="numbers" checked onchange="generate()">
                        <label for="numbers">数字 (0-9)</label>
                    </div>
                    <div class="option-item">
                        <input type="checkbox" id="symbols" checked onchange="generate()">
                        <label for="symbols">符号 (!@#$...)</label>
                    </div>
                </div>

                <div style="margin-top:20px">
                    <label>生成数量：</label>
                    <select id="count" onchange="generate()">
                        <option value="1">1个</option>
                        <option value="5">5个</option>
                        <option value="10" selected>10个</option>
                    </select>
                </div>

                <div id="passwordList" class="result" style="margin-top:16px;white-space:pre-line"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 在线工具箱</p>
        </div>
    </footer>

    <script>
        function updateLength() {
            document.getElementById('lengthValue').textContent = document.getElementById('length').value;
        }

        function generate() {
            const length = parseInt(document.getElementById('length').value);
            const useUpper = document.getElementById('upper').checked;
            const useLower = document.getElementById('lower').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;
            const count = parseInt(document.getElementById('count').value);

            let chars = '';
            if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (useNumbers) chars += '0123456789';
            if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (!chars) {
                alert('请至少选择一种字符类型');
                return;
            }

            const passwords = [];
            for (let i = 0; i < count; i++) {
                let pwd = '';
                const array = new Uint32Array(length);
                crypto.getRandomValues(array);
                for (let j = 0; j < length; j++) {
                    pwd += chars[array[j] % chars.length];
                }
                passwords.push(pwd);
            }

            document.getElementById('password').value = passwords[0];
            document.getElementById('passwordList').textContent = passwords.join('\n');
        }

        function copyPwd() {
            navigator.clipboard.writeText(document.getElementById('password').value);
            showToast('已复制');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        generate();
    </script>
</body>
</html>
