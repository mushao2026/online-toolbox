<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64编解码 - 在线工具箱</title>
    <meta name="description" content="Base64编码解码工具，支持文本和图片">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="tool-page">
    <header class="tool-header">
        <div class="container">
            <a href="../index.html" class="back-link">← 返回</a>
            <h1 class="tool-title">Base64编解码</h1>
        </div>
    </header>

    <main class="tool-content">
        <div class="container">
            <div class="tool-section">
                <h3>文本编码</h3>
                <div class="two-col">
                    <div>
                        <label>原始文本：</label>
                        <textarea id="plainText" placeholder="输入要编码的文本..." oninput="encodeText()"></textarea>
                    </div>
                    <div>
                        <label>Base64结果：</label>
                        <textarea id="encodedText" placeholder="Base64编码结果..." oninput="decodeText()"></textarea>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="encodeText()">编码 →</button>
                    <button class="btn btn-secondary" onclick="decodeText()">← 解码</button>
                    <button class="btn btn-secondary" onclick="copyEncoded()">复制编码结果</button>
                </div>
            </div>

            <div class="tool-section">
                <h3>图片转Base64</h3>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">🖼️</div>
                    <p>点击或拖拽图片上传</p>
                    <input type="file" id="fileInput" accept="image/*" style="display:none">
                </div>
                <div id="imageResult" style="margin-top:16px;display:none">
                    <label>Base64结果：</label>
                    <textarea id="imageBase64" style="min-height:100px"></textarea>
                    <div class="btn-group">
                        <button class="btn btn-secondary" onclick="copyImageBase64()">复制</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 在线工具箱</p>
        </div>
    </footer>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleImage(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleImage(e.target.files[0]);
        });

        function encodeText() {
            try {
                document.getElementById('encodedText').value = btoa(unescape(encodeURIComponent(document.getElementById('plainText').value)));
            } catch (e) {}
        }

        function decodeText() {
            try {
                document.getElementById('plainText').value = decodeURIComponent(escape(atob(document.getElementById('encodedText').value)));
            } catch (e) {}
        }

        function handleImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('imageBase64').value = e.target.result;
                document.getElementById('imageResult').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function copyEncoded() {
            navigator.clipboard.writeText(document.getElementById('encodedText').value);
            showToast('已复制');
        }

        function copyImageBase64() {
            navigator.clipboard.writeText(document.getElementById('imageBase64').value);
            showToast('已复制');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
